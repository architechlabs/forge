name: "Forge"
version: "0.1.5"
slug: "forge"
description: >-
  Copy, merge, mirror, and control entities from multiple Home Assistant
  instances with integration-aware planning and managed local helper entities.
url: "https://github.com/architechlabs/Forge"
arch:
  - amd64
  - armv7
  - aarch64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:anvil
panel_title: Forge
panel_admin: true
homeassistant_api: true
auth_api: true
hassio_api: true
hassio_role: homeassistant
map:
  - config:rw
environment:
  PORT: "8099"
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "Forge API and web interface (Ingress preferred)"
options:
  log_level: info
  poll_interval: 15
  allow_config_writes: true
  package_name: forge
  max_entities_per_import: 500
schema:
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
  poll_interval: "int(5,3600)"
  allow_config_writes: bool
  package_name: "match(^[a-zA-Z0-9_-]+$)"
  max_entities_per_import: "int(1,5000)"
watchdog: "http://[HOST]:[PORT:8099]/health"
